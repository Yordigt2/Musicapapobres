<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musica Para Pobres II</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8f9fc; --text: #2d3436; --accent: #1DB954; --card: #ffffff; --shadow: rgba(0,0,0,0.05); --nav-bg: #ffffff; }
        [data-theme="dark"] { --bg: #121212; --text: #ffffff; --accent: #1DB954; --card: #1e1e1e; --shadow: rgba(0,0,0,0.4); --nav-bg: #181818; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: background 0.3s ease; }
        #app-container { flex: 1; position: relative; padding: 20px; overflow-y: auto; padding-bottom: 100px; }
        .page { display: none; animation: fadeIn 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        h1 { font-weight: 800; font-size: 1.8rem; margin-bottom: 20px; color: white; }
        .card { background: var(--card); border-radius: 24px; padding: 24px; box-shadow: 0 10px 30px var(--shadow); margin-bottom: 20px; }
        input { width: 100%; padding: 16px; border-radius: 14px; border: none; background: #282828; color: white; margin-bottom: 15px; outline: none; }
        button.primary { width: 100%; background: var(--accent); color: black; border: none; padding: 16px; border-radius: 30px; font-weight: 800; cursor: pointer; transition: transform 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        button.primary:active { transform: scale(0.95); }
        .song-item { display: flex; align-items: center; padding: 15px; border-radius: 16px; margin-bottom: 12px; background: var(--card); }
        .song-art { width: 48px; height: 48px; background: #282828; border-radius: 8px; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--nav-bg); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-item { text-align: center; color: #b3b3b3; cursor: pointer; font-size: 10px; font-weight: 600; }
        .nav-item.active { color: white; }
        .nav-icon { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body data-theme="dark"> 
    <div id="app-container">
        <div id="home" class="page active">
            <h1>Descubrir</h1>
            <div class="card">
                <p style="font-size: 0.85rem; opacity: 0.7; margin-bottom: 15px;">Pega el enlace de YouTube para descargar el MP3 directamente a tu dispositivo.</p>
                <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=...">
                <button class="primary" onclick="descargar()">DESCARGAR AHORA</button>
            </div>
            <div id="status" style="text-align: center; font-size: 0.8rem; color: var(--accent); font-weight: 600; margin-top: 10px;"></div>
        </div>

        <div id="library" class="page">
            <h1>Tu Biblioteca</h1>
            <div id="songList">
                <p id="empty-msg" style="opacity: 0.5; text-align: center; margin-top: 40px;">Tu historial de descargas aparecerá aquí.</p>
            </div>
        </div>

        <div id="settings" class="page">
            <h1>Ajustes</h1>
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span>Modo Oscuro</span>
                    <button onclick="toggleTheme()" style="padding: 8px 20px; border-radius: 20px; border: 1px solid var(--accent); background: transparent; color: var(--accent); cursor:pointer; font-weight:bold;">Cambiar</button>
                </div>
            </div>
            <p style="text-align: center; font-size: 0.7rem; opacity: 0.4; margin-top: 20px;">Musica Para Pobres II v2.0 © 2026</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showPage('home', this)"> <span class="nav-icon">🏠</span> Inicio </div>
        <div class="nav-item" onclick="showPage('library', this)"> <span class="nav-icon">📚</span> Biblioteca </div>
        <div class="nav-item" onclick="showPage('settings', this)"> <span class="nav-icon">⚙️</span> Ajustes </div>
    </nav>

    <script>
        function showPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            element.classList.add('active');
        }

        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            body.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
        }

        async function descargar() {
            const urlInput = document.getElementById('urlInput');
            const status = document.getElementById('status');
            const url = urlInput.value;
            
            if (!url) { status.innerText = "⚠️ PEGA UN ENLACE VÁLIDO"; return; }

            status.innerText = "⏳ PROCESANDO DESCARGA...";
            
            try {
                // REDIRECCIÓN DINÁMICA: Funciona en localhost y en la web pública
                const downloadUrl = `/api/download?url=${encodeURIComponent(url)}`;
                
                // Iniciamos la descarga abriendo el link en una pestaña invisible/segundo plano
                window.location.href = downloadUrl;
                
                // Actualizamos la biblioteca visualmente
                setTimeout(() => {
                    const songList = document.getElementById('songList');
                    const emptyMsg = document.getElementById('empty-msg');
                    if (emptyMsg) emptyMsg.remove();
                    
                    const newItem = document.createElement('div');
                    newItem.className = 'song-item';
                    newItem.innerHTML = `
                        <div class="song-art">🎵</div>
                        <div>
                            <div style="font-weight: 600; font-size: 0.9rem;">Canción en proceso</div>
                            <div style="font-size: 0.7rem; opacity: 0.6;">Revisa tu carpeta de descargas</div>
                        </div>`;
                    songList.prepend(newItem);
                    
                    status.innerText = "✅ PROCESO INICIADO";
                    urlInput.value = '';
                }, 2000);

            } catch (e) { 
                status.innerText = "❌ ERROR DE CONEXIÓN"; 
            }
        }
    </script>
</body>
</html>
